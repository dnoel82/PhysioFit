<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // GitHub Pages extensionless URL fix
    // Redirects /about → /about.html, etc.
    (function() {
      var path = window.location.pathname;
      // If path doesn't end with / and has no extension, try adding .html
      if (path.slice(-1) !== '/' && path.indexOf('.') === -1) {
        window.location.replace(path + '.html' + window.location.search + window.location.hash);
      }
    })();
  </script>
</head>
<body></body>
</html>
